        const playlistToggle = document.getElementById('playlist-toggle');
        const toggleArrow = document.getElementById('toggle-arrow');
        let currentIndex = 0;

        // 生成播放列表DOM
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            audioList.forEach((item, index) => {
                const playlistItem = document.createElement('div');
                playlistItem.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                playlistItem.textContent = item.title;
                playlistItem.onclick = () => playAudio(index);
                playlistContainer.appendChild(playlistItem);
            });
        }

        // 播放逻辑 - 保留兼容性优化
        function playAudio(index) {
            currentIndex = index;
            const targetAudio = audioList[index];
            audioSource.src = targetAudio.src;
            audioSource.type = targetAudio.type || 'audio/flac';
            currentTitle.textContent = targetAudio.title;
            audio.load();
            try {
                audio.play().catch(err => {
                    console.log('需用户交互后播放：', err);
                    currentTitle.textContent += '（请点击播放按钮）';
                });
            } catch (e) {
                console.error('播放失败：', e);
            }
            renderPlaylist();
        }

        // 折叠/展开切换函数
        function togglePlaylist() {
            playlistContainer.classList.toggle('show');
            toggleArrow.classList.toggle('active');
        }

        // 刷新页面随机播放一首
        function randomPlayOnLoad() {
            currentIndex = Math.floor(Math.random() * audioList.length);
            playAudio(currentIndex);
        }

        // 页面加载完成后执行
        window.onload = () => {
            renderPlaylist();
            randomPlayOnLoad();
            playlistToggle.addEventListener('click', togglePlaylist);
        };

        // 2. 原有页面功能代码
        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = "Copied";
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('success');
                }, 1500);
            }).catch(err => {
                alert("复制失败，请手动复制");
                console.error('复制失败: ', err);

            const prefixInput = document.getElementById('prefix-input');
            const tipText = document.getElementById('tip-text');
            const reg = /^[a-zA-Z0-9_\-]+$/;
            const prefix = prefixInput.value.trim();

            if (prefix === '') {
                prefixInput.classList.remove('valid', 'invalid');
                tipText.textContent = '';
                return;
            }

            if (reg.test(prefix)) {
                prefixInput.classList.add('valid');
                prefixInput.classList.remove('invalid');
                tipText.textContent = '';
            } else {
                prefixInput.classList.add('invalid');
                prefixInput.classList.remove('valid');
                tipText.textContent = '前缀仅支持字母、数字、下划线和短横线';
            }
        }

        function fillAndGenerate(prefix) {
            const prefixInput = document.getElementById('prefix-input');
            prefixInput.value = prefix;
            generateDomain();
        }

        function generateDomain() {
            const prefixInput = document.getElementById('prefix-input');
            const prefix = prefixInput.value.trim();
            const domain = document.getElementById('domain-select').value;
            const tipText = document.getElementById('tip-text');
            const resultDomain = document.getElementById('result-domain');
            const resultCopyBtn = document.querySelector('.result-copy-btn');
            const reg = /^[a-zA-Z0-9_\-]+$/;

            if (!prefix) {
                alert("请输入自定义前缀！");
                return;
            }

            if (!reg.test(prefix)) {
                tipText.textContent = '前缀格式非法，请修改后重试';
                return;
            }

            const fullDomain = `${prefix}.${domain}`;
            resultDomain.textContent = fullDomain;
            resultDomain.style.display = 'block';
            resultCopyBtn.style.display = 'block';
        }

        function copyResult() {
            const resultText = document.getElementById('result-domain').textContent;
            if (!resultText) {
                alert("请先生成域名！");
                return;
            }
            const btn = document.querySelector('.result-copy-btn');
            btn.textContent = "已复制";
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = "复制生成的域名";
                btn.classList.remove('success');
            }, 1500);
            navigator.clipboard.writeText(resultText).catch(err => {
                alert("复制失败，请手动复制");
                console.error('复制失败: ', err);
            });
        }
    </script>
</body>
</html>
